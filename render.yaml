services:
  # AlphaStryk Backend API Web Service
  - type: web
    name: alphastryk-api
    env: node
    plan: starter
    buildCommand: npm install && npm run db:generate && npm run build:api
    startCommand: npm start --workspace=apps/api
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: https://alphastryk.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: PHONEPE_MERCHANT_ID
        sync: false
      - key: PHONEPE_SALT_KEY
        sync: false
      - key: PHONEPE_SALT_INDEX
        sync: false
      - key: RESEND_API_KEY
        sync: false
